<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Scholar Rank</title>
    <link rel="stylesheet" href="/static/css/scholar-rank.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/" class="brand">🎓 Scholar Rank</a>
            <div class="nav-links">
                <span id="userName" style="font-weight: 600; color: var(--primary);">Teacher</span>
                <a href="/logout" class="btn btn-outline" style="padding: 0.4rem 1rem;">Logout</a>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar glass-panel">
            <h3>Management Tools</h3>
            <ul class="teacher-list">
                <li class="teacher-item active" onclick="showSection('notes', this)">📚 Upload Notes</li>
                <li class="teacher-item" onclick="showSection('notices', this)">📌 Post Notice</li>
                <li class="teacher-item" onclick="showSection('zoom', this)">🎥 Zoom Link</li>
                <li class="teacher-item" onclick="showSection('tests', this)">📝 Manage Tests</li>
            </ul>
        </aside>

        <main class="main-content">
            
            <!-- Upload Notes Section -->
            <div id="notesSection" class="glass-panel card">
                <div class="card-header">
                    <h2>Upload Course Material</h2>
                </div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label class="form-label">Material Title</label>
                        <input type="text" id="noteTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" id="noteSubject" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description (Optional)</label>
                        <textarea id="noteDesc" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">File</label>
                        <input type="file" id="noteFile" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload Material</button>
                </form>
            </div>

            <!-- Post Notice Section -->
            <div id="noticesSection" class="glass-panel card" style="display: none;">
                <div class="card-header">
                    <h2>Post a Notice</h2>
                </div>
                <form id="noticeForm">
                    <div class="form-group">
                        <label class="form-label">Notice Title</label>
                        <input type="text" id="noticeTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Content</label>
                        <textarea id="noticeContent" class="form-control" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Publish Notice</button>
                </form>
            </div>

            <!-- Zoom Link Section -->
            <div id="zoomSection" class="glass-panel card" style="display: none;">
                <div class="card-header">
                    <h2>Set Zoom Class Link</h2>
                </div>
                <form id="zoomForm">
                    <div class="form-group">
                        <label class="form-label">Zoom URL</label>
                        <input type="url" id="zoomUrl" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Meeting ID</label>
                        <input type="text" id="zoomId" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Passcode</label>
                        <input type="text" id="zoomPass" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Set Class Link</button>
                </form>
            </div>

            <!-- Tests Section -->
            <div id="testsSection" class="glass-panel card" style="display: none;">
                <div class="card-header">
                    <h2>Manage Tests</h2>
                </div>
                
                <form id="testForm">
                    <div class="form-group">
                        <label class="form-label">Test Title</label>
                        <input type="text" id="testTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description (Optional)</label>
                        <textarea id="testDesc" class="form-control" rows="2"></textarea>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label class="form-label">Start Time</label>
                            <input type="datetime-local" id="testStart" class="form-control" required>
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label class="form-label">End Time</label>
                            <input type="datetime-local" id="testEnd" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="card-header" style="margin-top: 2rem;">
                        <h3 style="font-size: 1.2rem;">Questions</h3>
                        <button type="button" class="btn btn-outline" onclick="addQuestion()" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;">+ Add Question</button>
                    </div>
                    
                    <div id="questionsContainer" style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem;">
                        <!-- Questions will be injected here -->
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Test</button>
                </form>
            </div>

        </main>
    </div>

    <script>
        function showSection(id, element) {
            document.querySelectorAll('.teacher-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            document.getElementById('notesSection').style.display = 'none';
            document.getElementById('noticesSection').style.display = 'none';
            document.getElementById('zoomSection').style.display = 'none';
            document.getElementById('testsSection').style.display = 'none';
            
            document.getElementById(id + 'Section').style.display = 'block';
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('noteTitle').value);
            formData.append('subject', document.getElementById('noteSubject').value);
            formData.append('description', document.getElementById('noteDesc').value);
            formData.append('file', document.getElementById('noteFile').files[0]);

            const res = await fetch('/api/teacher/notes', { method: 'POST', body: formData });
            if (res.ok) { alert('Material uploaded successfully!'); e.target.reset(); }
            else { alert('Failed to upload material.'); }
        });

        document.getElementById('noticeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('noticeTitle').value,
                content: document.getElementById('noticeContent').value
            };
            const res = await fetch('/api/teacher/notices', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) { alert('Notice published!'); e.target.reset(); }
            else { alert('Failed to publish notice.'); }
        });

        document.getElementById('zoomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                url: document.getElementById('zoomUrl').value,
                meeting_id: document.getElementById('zoomId').value,
                password: document.getElementById('zoomPass').value,
                scheduled_time: new Date().toISOString()
            };
            const res = await fetch('/api/teacher/zoom-link', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) { alert('Zoom link updated!'); e.target.reset(); }
            else { alert('Failed to update zoom link.'); }
        });
        let questionCount = 0;

        function addQuestion() {
            questionCount++;
            const container = document.getElementById('questionsContainer');
            const qDiv = document.createElement('div');
            qDiv.className = 'glass-panel';
            qDiv.style.padding = '1.5rem';
            qDiv.style.background = 'rgba(255,255,255,0.4)';
            qDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h4 style="margin: 0;">Question ${questionCount}</h4>
                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="btn" style="color: #EF4444; padding: 0.2rem 0.5rem; background: transparent;">Remove</button>
                </div>
                <div style="display: flex; gap: 1rem; align-items: flex-start; margin-bottom: 1rem;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label class="form-label" style="font-size: 0.8rem; color: var(--text-muted);">Question Text</label>
                        <input type="text" class="form-control q-text" placeholder="Enter question text here..." required>
                    </div>
                    <div class="form-group" style="width: 100px; margin-bottom: 0;">
                        <label class="form-label" style="font-size: 0.8rem; color: var(--text-muted);">Marks</label>
                        <input type="number" class="form-control q-marks" placeholder="1" value="1" min="1" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div><input type="text" class="form-control q-opt-0" placeholder="Option 1" required></div>
                    <div><input type="text" class="form-control q-opt-1" placeholder="Option 2" required></div>
                    <div><input type="text" class="form-control q-opt-2" placeholder="Option 3" required></div>
                    <div><input type="text" class="form-control q-opt-3" placeholder="Option 4" required></div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Correct Option</label>
                    <select class="form-control q-correct" required>
                        <option value="0">Option 1</option>
                        <option value="1">Option 2</option>
                        <option value="2">Option 3</option>
                        <option value="3">Option 4</option>
                    </select>
                </div>
            `;
            container.appendChild(qDiv);
        }

        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const qElements = document.getElementById('questionsContainer').children;
            if (qElements.length === 0) {
                alert('Please add at least one question to the test.');
                return;
            }

            const questions = [];
            for (let el of qElements) {
                questions.push({
                    question: el.querySelector('.q-text').value,
                    options: [
                        el.querySelector('.q-opt-0').value,
                        el.querySelector('.q-opt-1').value,
                        el.querySelector('.q-opt-2').value,
                        el.querySelector('.q-opt-3').value
                    ],
                    correct_answer: parseInt(el.querySelector('.q-correct').value),
                    marks: parseInt(el.querySelector('.q-marks').value) || 1
                });
            }

            const payload = {
                title: document.getElementById('testTitle').value,
                description: document.getElementById('testDesc').value,
                start_time: new Date(document.getElementById('testStart').value).toISOString(),
                end_time: new Date(document.getElementById('testEnd').value).toISOString(),
                questions: questions
            };

            const res = await fetch('/api/teacher/tests', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) { 
                alert('Test created successfully!'); 
                e.target.reset(); 
                document.getElementById('questionsContainer').innerHTML = '';
                questionCount = 0;
                addQuestion();
            }
            else { alert('Failed to create test.'); }
        });
        
        window.addEventListener('DOMContentLoaded', () => addQuestion());
    </script>
</body>
</html>
