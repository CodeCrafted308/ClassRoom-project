<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Scholar Rank</title>
    <link rel="stylesheet" href="/static/css/scholar-rank.css">
</head>
    <script src="/static/js/theme.js"></script>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2>Teacher Dashboard</h2>
            <div class="nav-links">
                <span id="user-name"></span>
                <a href="/logout" class="btn btn-secondary">Logout</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showSection('notes')">Notes Management</button>
            <button class="tab-btn" onclick="showSection('students')">Student Records</button>
            <button class="tab-btn" onclick="showSection('notices')">Notice Board</button>
            <button class="tab-btn" onclick="showSection('zoom')">Zoom Class</button>
            <button class="tab-btn" onclick="showSection('tests')">Test Management</button>
        </div>
        
        <!-- Notes Management Section -->
        <div id="notes-section" class="section active">
            <h2>Notes Management</h2>
            <div class="card">
                <h3>Upload New Note</h3>
                <form id="uploadNoteForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="note-title" required>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="note-subject" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="note-description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>File (PDF, DOCX, PPT)</label>
                        <input type="file" id="note-file" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload Note</button>
                </form>
            </div>
            
            <div class="card">
                <h3>Uploaded Notes</h3>
                <div id="notes-list" class="notes-list"></div>
            </div>
        </div>
        
        <!-- Student Records Section -->
        <div id="students-section" class="section">
            <h2>Student Records</h2>
            <div id="students-list" class="students-list"></div>
        </div>
        
        <!-- Notice Board Section -->
        <div id="notices-section" class="section">
            <h2>Notice Board</h2>
            <div class="card">
                <h3>Post New Notice</h3>
                <form id="noticeForm">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="notice-title" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="notice-content" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Post Notice</button>
                </form>
            </div>
            <div class="card">
                <h3>Recent Notices</h3>
                <div id="notices-list" class="notices-list"></div>
            </div>
        </div>
        
        <!-- Zoom Class Section -->
        <div id="zoom-section" class="section">
            <h2>Virtual Classroom - Zoom Link</h2>
            <div class="card">
                <form id="zoomForm">
                    <div class="form-group">
                        <label>Zoom Meeting URL</label>
                        <input type="url" id="zoom-url" placeholder="https://zoom.us/j/..." required>
                    </div>
                    <div class="form-group">
                        <label>Meeting ID (optional)</label>
                        <input type="text" id="zoom-meeting-id">
                    </div>
                    <div class="form-group">
                        <label>Password (optional)</label>
                        <input type="text" id="zoom-password">
                    </div>
                    <div class="form-group">
                        <label>Scheduled Time</label>
                        <input type="datetime-local" id="zoom-time">
                    </div>
                    <button type="submit" class="btn btn-primary">Set Zoom Link</button>
                </form>
                <div id="current-zoom-link" class="zoom-display"></div>
            </div>
        </div>
        
        <!-- Test Management Section -->
        <div id="tests-section" class="section">
            <h2>Test Management</h2>
            <div class="card">
                <h3>Create New Test</h3>
                <form id="testForm">
                    <div class="form-group">
                        <label>Test Title</label>
                        <input type="text" id="test-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="test-description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="datetime-local" id="test-start-time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="datetime-local" id="test-end-time" required>
                    </div>
                    <div id="questions-container">
                        <h4>Questions</h4>
                        <div id="questions-list"></div>
                        <button type="button" class="btn btn-secondary" onclick="addQuestion()">Add Question</button>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Test</button>
                </form>
            </div>
            <div class="card">
                <h3>Created Tests</h3>
                <div id="tests-list" class="tests-list"></div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/teacher.js') }}"></script>
</body>
</html>
