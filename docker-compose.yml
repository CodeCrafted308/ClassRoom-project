version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: classroom_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: classroom_db
    networks:
      - classroom_network

  flask-app:
    build: .
    container_name: classroom_flask
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    depends_on:
      - mongodb
    environment:
      - FLASK_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/classroom_db
    networks:
      - classroom_network

volumes:
  mongodb_data:
  uploads_data:

networks:
  classroom_network:
    driver: bridge


